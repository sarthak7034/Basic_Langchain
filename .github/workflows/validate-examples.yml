name: Validate Examples

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'examples/**'
      - 'projects/**'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'examples/**'
      - 'projects/**'

jobs:
  validate:
    name: Validate Example Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check Python syntax in examples
        run: |
          python -m py_compile examples/**/*.py || echo "No Python files in examples or syntax errors found"
      
      - name: Check Python syntax in projects
        run: |
          python -m py_compile projects/**/*.py || echo "No Python files in projects or syntax errors found"
      
      - name: Validate imports
        run: |
          # Check if all imports can be resolved
          for file in $(find examples projects -name "*.py" 2>/dev/null); do
            echo "Checking imports in $file"
            python -c "import ast; ast.parse(open('$file').read())" || echo "Issue in $file"
          done
